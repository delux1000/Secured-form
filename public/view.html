<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Submission Details</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0b1120;
            padding: 24px;
        }
        .card {
            max-width: 700px;
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 32px;
            padding: 40px;
            color: #fff;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
        }
        .card h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .card h1 i {
            color: #7c3aed;
        }
        .detail-row {
            display: flex;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        .detail-label {
            width: 140px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
            flex-shrink: 0;
        }
        .detail-value {
            color: #fff;
            word-break: break-word;
        }
        .detail-value img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 16px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            margin-top: 8px;
        }
        .back-link {
            display: inline-block;
            margin-top: 24px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            transition: background 0.25s;
        }
        .back-link:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }
        .loading {
            text-align: center;
            padding: 60px 0;
            color: rgba(255, 255, 255, 0.4);
        }
        .loading i {
            font-size: 48px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .status-badge {
            display: inline-block;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            background: #f59e0b;
            color: #000;
        }
        .status-badge.approved {
            background: #10b981;
        }
    </style>
</head>
<body>
    <div class="card" id="viewCard">
        <h1><i class="fas fa-file-alt"></i> Submission Details</h1>
        <div id="content">
            <div class="loading"><i class="fas fa-spinner"></i><br />Loading...</div>
        </div>
        <a href="/admin.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Admin</a>
    </div>

    <script>
        async function fetchSubmission() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) {
                document.getElementById('content').innerHTML = '<p style="color:#f87171;">No submission ID provided.</p>';
                return;
            }

            try {
                const response = await fetch(`/api/submission/${id}`);
                if (!response.ok) throw new Error('Not found');
                const data = await response.json();

                const content = document.getElementById('content');
                const statusClass = data.status === 'approved' ? 'approved' : '';
                content.innerHTML = `
                    <div class="detail-row"><span class="detail-label">ID</span><span class="detail-value">${data.id}</span></div>
                    <div class="detail-row"><span class="detail-label">Full Name</span><span class="detail-value">${data.fullName}</span></div>
                    <div class="detail-row"><span class="detail-label">Address</span><span class="detail-value">${data.address}</span></div>
                    <div class="detail-row"><span class="detail-label">Country</span><span class="detail-value">${data.country}</span></div>
                    <div class="detail-row"><span class="detail-label">County Code</span><span class="detail-value">${data.countyCode}</span></div>
                    <div class="detail-row"><span class="detail-label">Email</span><span class="detail-value">${data.email}</span></div>
                    <div class="detail-row"><span class="detail-label">Status</span><span class="detail-value"><span class="status-badge ${statusClass}">${data.status}</span></span></div>
                    <div class="detail-row"><span class="detail-label">Timestamp</span><span class="detail-value">${new Date(data.timestamp).toLocaleString()}</span></div>
                    <div class="detail-row"><span class="detail-label">Image</span><span class="detail-value"><img src="data:image/jpeg;base64,${data.image}" alt="Uploaded" /></span></div>
                `;
            } catch (err) {
                document.getElementById('content').innerHTML = `<p style="color:#f87171;">Error: ${err.message}</p>`;
            }
        }

        fetchSubmission();
    </script>
</body>
</html>
