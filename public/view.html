<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Submission Details</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0b1120;
      color: #fff;
      padding: 40px 24px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 24px;
      padding: 40px;
      max-width: 560px;
      width: 100%;
      backdrop-filter: blur(12px);
    }
    .card h2 {
      font-size: 24px;
      margin-bottom: 6px;
    }
    .card .sub {
      color: rgba(255,255,255,0.4);
      margin-bottom: 24px;
    }
    .field {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .field .label {
      color: rgba(255,255,255,0.5);
      font-size: 14px;
    }
    .field .value {
      font-weight: 600;
    }
    .status-badge {
      display: inline-block;
      padding: 2px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      text-transform: capitalize;
    }
    .status-badge.pending { background: rgba(245,158,11,0.2); color: #fbbf24; }
    .status-badge.approved { background: rgba(16,185,129,0.2); color: #34d399; }
    .status-badge.declined { background: rgba(239,68,68,0.2); color: #f87171; }
    .back-btn {
      display: inline-block;
      margin-top: 20px;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }
    .back-btn:hover { color: #fff; }
    .loading { text-align: center; padding: 40px 0; color: rgba(255,255,255,0.3); }
    .error { color: #f87171; text-align: center; }
  </style>
</head>
<body>
  <div class="card" id="detailCard">
    <h2><i class="fas fa-file-invoice"></i> Submission Details</h2>
    <p class="sub" id="loadingMsg">Loading…</p>
    <div id="content" style="display:none;">
      <div class="field"><span class="label">Name</span><span class="value" id="fullName">—</span></div>
      <div class="field"><span class="label">Email</span><span class="value" id="email">—</span></div>
      <div class="field"><span class="label">Address</span><span class="value" id="address">—</span></div>
      <div class="field"><span class="label">Country</span><span class="value" id="country">—</span></div>
      <div class="field"><span class="label">County Code</span><span class="value" id="countyCode">—</span></div>
      <div class="field"><span class="label">Status</span><span id="statusBadge">—</span></div>
      <div class="field"><span class="label">Submitted</span><span class="value" id="timestamp">—</span></div>
      <a href="/admin.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Admin</a>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const loadingMsg = document.getElementById('loadingMsg');
    const content = document.getElementById('content');

    if (!id) {
      loadingMsg.textContent = '❌ No ID provided';
      loadingMsg.style.color = '#f87171';
    } else {
      // ✅ Correct plural endpoint
      fetch(`/api/submissions/${id}`)
        .then(res => {
          if (!res.ok) throw new Error('Submission not found');
          return res.json();
        })
        .then(data => {
          loadingMsg.style.display = 'none';
          content.style.display = 'block';
          document.getElementById('fullName').textContent = data.fullName || '—';
          document.getElementById('email').textContent = data.email || '—';
          document.getElementById('address').textContent = data.address || '—';
          document.getElementById('country').textContent = data.country || '—';
          document.getElementById('countyCode').textContent = data.countyCode || '—';
          const status = data.status || 'pending';
          document.getElementById('statusBadge').innerHTML = `<span class="status-badge ${status}">${status}</span>`;
          document.getElementById('timestamp').textContent = data.timestamp ? new Date(data.timestamp).toLocaleString() : '—';
        })
        .catch(err => {
          loadingMsg.textContent = '❌ ' + err.message;
          loadingMsg.style.color = '#f87171';
        });
    }
  </script>
</body>
</html>
