<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin – All Submissions</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #0b1120;
            color: #fff;
            padding: 32px 24px;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        h1 i {
            color: #7c3aed;
        }
        .subtitle {
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 32px;
        }
        .table-wrap {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            overflow-x: auto;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 4px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th {
            text-align: left;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.6);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
        }
        td {
            padding: 14px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            vertical-align: middle;
        }
        td .status {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            background: #f59e0b;
            color: #000;
        }
        td .status.approved {
            background: #10b981;
        }
        td .status.pending {
            background: #f59e0b;
        }
        .view-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 16px;
            background: #7c3aed;
            border-radius: 10px;
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            font-size: 13px;
            transition: background 0.2s;
        }
        .view-btn:hover {
            background: #6d28d9;
        }
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.3);
        }
        .empty i {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
        }
        .refresh-btn {
            margin-left: 16px;
            padding: 6px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: none;
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }
        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.16);
        }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 2000;
            padding: 14px 24px;
            border-radius: 16px;
            background: rgba(20, 20, 50, 0.92);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #fff;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4);
            transform: translateY(120px);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-width: 420px;
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        .toast i {
            font-size: 20px;
        }
        .toast.success i {
            color: #34d399;
        }
        .toast.error i {
            color: #f87171;
        }
        @media (max-width: 700px) {
            th,
            td {
                padding: 10px 12px;
                font-size: 12px;
            }
            .view-btn {
                padding: 4px 10px;
                font-size: 11px;
            }
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="display: flex; align-items: center; flex-wrap: wrap; gap: 12px;">
            <h1><i class="fas fa-users-cog"></i> Admin Panel</h1>
            <button class="refresh-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
            <a href="/" style="margin-left: auto; color: rgba(255,255,255,0.5); text-decoration: none; font-size: 14px;"><i class="fas fa-plus-circle"></i> New Submission</a>
        </div>
        <p class="subtitle">All package submissions are listed below. Click "View" to see full details.</p>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Country</th>
                        <th>Status</th>
                        <th>Submitted</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="submissionsBody">
                    <tr><td colspan="6" class="empty"><i class="fas fa-spinner fa-spin"></i> Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="toast" id="toast"><i class="fas fa-check-circle"></i><span id="toastMessage"></span></div>

    <script>
        async function fetchSubmissions() {
            const tbody = document.getElementById('submissionsBody');
            try {
                const res = await fetch('/api/submissions');
                if (!res.ok) throw new Error('Failed to fetch');
                const data = await res.json();

                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6" class="empty"><i class="fas fa-box-open"></i> No submissions yet.</td></tr>`;
                    return;
                }

                let html = '';
                data.forEach(item => {
                    const statusClass = item.status === 'approved' ? 'approved' : 'pending';
                    const date = new Date(item.timestamp).toLocaleDateString() + ' ' + new Date(item.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    html += `
                        <tr>
                            <td><strong>${escapeHtml(item.fullName)}</strong></td>
                            <td>${escapeHtml(item.email)}</td>
                            <td>${escapeHtml(item.country)}</td>
                            <td><span class="status ${statusClass}">${item.status}</span></td>
                            <td style="font-size:12px;color:rgba(255,255,255,0.6);">${date}</td>
                            <td><a href="/view.html?id=${item.id}" class="view-btn"><i class="fas fa-eye"></i> View</a></td>
                        </tr>
                    `;
                });
                tbody.innerHTML = html;
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="6" style="color:#f87171;text-align:center;">Error: ${err.message}</td></tr>`;
                showToast('Failed to load submissions', 'error');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const msg = document.getElementById('toastMessage');
            const icon = toast.querySelector('i');
            msg.textContent = message;
            toast.className = 'toast ' + type;
            icon.className = type === 'success' ? 'fas fa-check-circle' : 'fas fa-exclamation-circle';
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.classList.remove('show'), 4000);
        }

        document.getElementById('refreshBtn').addEventListener('click', () => {
            fetchSubmissions();
            showToast('Refreshed', 'success');
        });

        // Load on page load
        fetchSubmissions();
    </script>
</body>
</html>
